# ============================================
# User-Friendly tmux Configuration
# Prefix is Ctrl+Space (avoids conflict with Claude Code's Ctrl+b)
# ============================================

# --- Prefix Key ---
# Ctrl+Space instead of the default Ctrl+b. Ergonomic, no shell conflicts,
# and frees Ctrl+b for Claude Code's "background task" shortcut.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Basic Settings ---
# Use tmux-256color for truecolor support (16M colors instead of 256).
# If colors look wrong in your terminal, revert to "screen-256color".
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Allow apps to set cursor style (Ss=set, Se=reset) — fixes invisible cursor in TUI apps
set-option -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g history-limit 50000
set -g mouse on
# Pass through OSC escape sequences (e.g. OSC 8 hyperlinks from Claude Code)
# so Ghostty can render clickable links inside tmux
set -g allow-passthrough on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g display-time 2000
set -g escape-time 0

# Highlight windows with unseen activity in the status bar.
# Combined with the window-status formats below, this gives a visual cue
# (muted color change) when a background window has new output.
setw -g monitor-activity on
set -g visual-activity off          # Don't show a message, just style the tab
setw -g window-status-activity-style none   # Don't restyle the tab — the ● indicator is enough

# --- Status Bar ---
# Uses terminal colors (colour0-15) so the bar matches Ghostty's color scheme.
set -g status-style 'bg=default fg=default'
set -g status-left '#[fg=colour0,bg=colour4,bold] #S #[default] '
set -g status-left-length 30
set -g status-right '#(~/.local/bin/claude-burn) #[dim]│#[default] #[fg=colour8]%Y-%m-%d #[fg=default,bold]%H:%M '
set -g status-right-length 80
setw -g window-status-format ' #I:#W#{?window_activity_flag,#[fg=colour3] ●,}#{?#{==:#{@claude_status},processing}, ⏳,#{?#{==:#{@claude_status},done}, ✓,}} '
setw -g window-status-current-format '#[fg=colour0,bg=colour4,bold] #I:#W#{?#{==:#{@claude_status},processing}, ⏳,#{?#{==:#{@claude_status},done}, ✓,}} #[default]'

# --- Pane Borders ---
set -g pane-border-style 'fg=colour8'
set -g pane-active-border-style 'fg=colour4,bold'
# pane-border-lines requires tmux 3.2+
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" = "$(printf "%s\n3.2\n" "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" | sort -V | tail -1)" ]' \
  'set -g pane-border-lines heavy'

# --- Active Pane Indicator ---
# Inactive panes get a slightly darker background using Catppuccin Mocha's
# "Mantle" color. Active pane uses the terminal's default background (Base).
# Update these if you change your Ghostty theme.
set -g window-style 'fg=#6c7086,bg=#11111b'
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e'

# --- Claude Code Status Indicator ---
# Shows processing/done status in window tabs for windows running Claude Code.
# Driven by hooks in ~/.claude/settings.json:
#   UserPromptSubmit → sets @claude_status "processing" (⏳ in tab)
#   Stop             → sets @claude_status "done"       (✓ in tab)
# When you switch to a window with "done" status, it auto-clears so you can
# distinguish new completions from ones you've already seen.
# "processing" stays visible even when focused — only "done" clears on visit.
set-hook -g after-select-window 'if -F "#{==:#{@claude_status},done}" "set -w -u @claude_status"'

# --- Blinking Cursor (tmux 3.4+) ---
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" = "$(printf "%s\n3.4\n" "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" | sort -V | tail -1)" ]' \
  'set -g cursor-style blinking-block'

# --- Menus (tmux 3.2+ only — display-menu was added in 3.2) ---
# On older tmux, prefix + ? falls back to list-keys.
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" = "$(printf "%s\n3.2\n" "$(tmux -V | cut -d" " -f2 | tr -d "a-z")" | sort -V | tail -1)" ]' \
  'source-file ~/.tmux/menus.conf' \
  'bind-key ? list-keys'

# --- Intuitive Split Bindings ---
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# --- Easy Pane Navigation (prefix + h/j/k/l) ---
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Pane Resizing (prefix + H/J/K/L) ---
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# --- Reload Config ---
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Copy Mode (vi style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Click status bar tab to switch window ---
# Explicitly set so source-file reloads always win over any stale session state.
# '=' resolves to the window under the mouse cursor in a mouse event context.
bind-key -T root MouseDown1Status select-window -t =

# --- Don't exit copy mode on mouse drag end ---
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# --- macOS-Only Overrides (Light Theme) ---
# Local (macOS) uses a full light theme so you can instantly tell it apart
# from the dark devbox. Session name badge is color-coded:
#   green = dx (tooling), magenta = feat (features), blue = anything else.
# Status-right shows the focused pane's title for extra context.
# --- macOS-Only Overrides ---
# Session name badge is color-coded: green=dx, magenta=feat, blue=default.
# All other colors inherit from terminal (Ghostty) via the defaults above.
if-shell '[ "$(uname -s)" = "Darwin" ]' \
  'set -g status-left "#{?#{==:#S,dx},#[bg=colour2],#{?#{==:#S,feat},#[bg=colour5],#[bg=colour4]}}#[fg=colour0,bold] #S #[default] " ; \
   set -g status-right "#(~/.local/bin/claude-burn) #[dim]│#[default] #[fg=colour8]#{pane_title} #[dim]│#[default] #[fg=colour8]%H:%M " ; \
   set -g status-right-length 80'

# --- Nested Tmux Toggle (F12, macOS only) ---
# Press F12 to "pass through" keys to a remote/inner tmux session (e.g. devbox).
# Local status bar dims + shows "REMOTE" so you know keys are going through.
# Press F12 again to regain local control.
# Only loaded on macOS — the remote side should NOT have this binding,
# otherwise F12 would double-toggle and cancel itself out.
if-shell '[ "$(uname -s)" = "Darwin" ]' \
  'bind -T root F12 \
    set prefix None \; \
    set key-table off \; \
    set status-style "bg=colour0 fg=colour8,dim" \; \
    set status-right "#[fg=colour1,bold] REMOTE #[fg=colour8]│ #[fg=colour8]%H:%M " \; \
    refresh-client -S ; \
  bind -T off F12 \
    set prefix C-Space \; \
    set -u key-table \; \
    set -u status-style \; \
    set -u status-right \; \
    refresh-client -S'

# --- Plugins (via TPM) ---
# Install plugins:  prefix + I   (capital I)
# Update plugins:   prefix + U
# Uninstall:        prefix + alt + u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'    # Interactive keybinding cheatsheet
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions across restarts (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'       # Auto-saves sessions in the background
set -g @plugin 'christoomey/vim-tmux-navigator'    # Seamless Ctrl+hjkl navigation between vim/tmux panes

# --- Session Persistence (resurrect + continuum) ---
# Sessions auto-save every 15 min and auto-restore when tmux starts.
# Manual save: prefix + Ctrl-s   Manual restore: prefix + Ctrl-r
# Saved session data lives in ~/.tmux/resurrect/
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Keep this line at the very bottom — TPM needs it to load plugins.
run '~/.tmux/plugins/tpm/tpm'
